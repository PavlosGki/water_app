<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Water Tracker">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Water Tracker</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000; color: #ffffff;
            overflow: hidden; touch-action: none; 
        }

        .top-bar { position: absolute; top: 20px; left: 15px; z-index: 50; }
        
        .global-stats {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%); z-index: 50;
            font-size: 14px; font-weight: 700; color: #0a84ff; background: rgba(10, 132, 255, 0.15);
            padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(10, 132, 255, 0.4);
            white-space: nowrap;
        }

        .icon-btn { background: none; border: none; color: #8e8e93; padding: 10px; cursor: pointer; }
        
        #settings-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #settings-modal.open { opacity: 1; pointer-events: auto; }
        .settings-box { background: #1c1c1e; padding: 30px; border-radius: 30px; width: 90%; }
        
        .setting-row { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; text-align: left; }
        .setting-icon { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; color: #8e8e93; flex-shrink: 0; }
        .setting-content { flex: 1; }
        
        .setting-label { font-size: 12px; color: #8e8e93; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .setting-value { font-size: 20px; color: #0a84ff; font-weight: 800; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 12px 0; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #3a3a3c; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { height: 26px; width: 26px; border-radius: 50%; background: #0a84ff; -webkit-appearance: none; margin-top: -10px; }

        .save-btn { background: #0a84ff; color: #fff; border: none; padding: 16px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 16px; }

        #swipe-container { display: flex; width: 100vw; height: 100vh; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        #swipe-container::-webkit-scrollbar { display: none; }
        .screen { flex: 0 0 100vw; height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        .title-container { text-align: center; position: absolute; top: 85px; width: 100%; z-index: 5; }
        h1 { margin: 0; font-size: 22px; font-weight: 700; }
        .subtitle { color: #8e8e93; font-size: 13px; margin-top: 5px; }

        .bottle-grid, .glass-grid { display: grid; grid-template-columns: repeat(3, 1fr); justify-items: center; align-content: center; width: 92%; max-width: 500px; height: 60vh; margin-top: 50px; }
        .bottle-grid { gap: 20px 30px; }
        .glass-grid { gap: 15px 20px; }
        .bottle-wrap, .glass-wrap { cursor: pointer; position: relative; display: flex; justify-content: center; align-items: center; }

        .pitcher-container { position: relative; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #pitcher-wrap { width: 200px; height: 280px; position: relative; pointer-events: none; }
        .pitcher-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 18px; font-weight: 800; color: white; text-align: center; width: 100%; text-shadow: 0 2px 10px rgba(0,0,0,0.5); opacity: 0.9; }
        
        #pitcher-drag-zone { position: absolute; right: 0; top: 140px; bottom: 160px; width: 105px; background: #1c1c1e; border-radius: 35px 0 0 35px; display: flex; flex-direction: column-reverse; justify-content: space-between; cursor: ns-resize; touch-action: none; padding: 30px 0; z-index: 10; box-shadow: -5px 0 25px rgba(0,0,0,0.6); }
        #indicator-line { position: absolute; left: 0; right: 0; height: 3px; background: #ff3b30; box-shadow: 0 0 10px rgba(255, 59, 48, 0.7); pointer-events: none; z-index: 15; transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .tick { font-size: 10px; color: #636366; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; z-index: 5; position: relative; }
        .tick::after { content: ''; width: 8px; height: 1px; background: #48484a; }
        .tick.major { color: #8e8e93; font-weight: 800; }
        .tick.major::after { width: 18px; height: 2px; background: #636366; }

        .svg-obj { width: 100%; height: 100%; display: block; }
        .water-fill { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .dots { position: fixed; bottom: 85px; width: 100vw; display: flex; justify-content: center; gap: 8px; z-index: 5; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #48484a; transition: 0.3s; }
        .dot.active { background: #f2f2f7; }

        #history-sheet { position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; background-color: #1c1c1e; border-radius: 30px 30px 0 0; z-index: 60; transform: translateY(calc(100% - 65px)); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.6); }
        #history-sheet.open { transform: translateY(0); }
        .history-header-tab { height: 65px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .drag-handle { width: 36px; height: 5px; background-color: #48484a; border-radius: 3px; margin-bottom: 8px; }
        .tab-label { font-size: 11px; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: 1.5px; }
        .history-content { padding: 0 30px 40px; overflow-y: auto; height: calc(100% - 65px); }
        .export-btn { position: absolute; right: 20px; top: 15px; background: rgba(255,255,255,0.05); color: #0a84ff; border: 1px solid rgba(10, 132, 255, 0.3); padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <clipPath id="bottleMask"><path d="M 35 30 C 35 15, 40 15, 45 10 L 55 10 C 60 15, 65 15, 65 30 L 75 60 L 75 180 C 75 190, 65 195, 50 195 C 35 195, 25 190, 25 180 L 25 60 Z"/></clipPath>
            <clipPath id="glassMask"><path d="M 15 10 L 85 10 L 75 140 C 73 145, 68 150, 50 150 C 32 150, 27 145, 25 140 Z"/></clipPath>
            <clipPath id="pitcherMask"><path d="M 50 30 L 130 30 L 140 100 C 160 150, 160 250, 140 280 C 130 290, 50 290, 40 280 C 20 250, 20 150, 40 100 Z"/></clipPath>
        </defs>
    </svg>

    <div class="global-stats" id="global-display">0 / 2000 ml</div>

    <div class="top-bar">
        <button class="icon-btn" id="open-settings">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="overflow: visible;">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </button>
    </div>

    <div id="settings-modal">
        <div class="settings-box">
            <div class="setting-row">
                <div class="setting-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle><path d="M22 2l-6 6"></path></svg></div>
                <div class="setting-content">
                    <span class="setting-label">Ημερήσιος Στόχος</span>
                    <div id="goal-val" class="setting-value">2000 ml</div>
                    <input type="range" id="goal-slider" min="500" max="5000" step="100" value="2000">
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-icon"><svg width="28" height="42" viewBox="0 0 100 200" fill="none" stroke="currentColor" stroke-width="12"><path d="M 35 30 C 35 15, 40 15, 45 10 L 55 10 C 60 15, 65 15, 65 30 L 75 60 L 75 180 C 75 190, 65 195, 50 195 C 35 195, 25 190, 25 180 L 25 60 Z"/></svg></div>
                <div class="setting-content">
                    <span class="setting-label">Μέγεθος Μπουκαλιού</span>
                    <div id="bottle-size-val" class="setting-value">750 ml</div>
                    <input type="range" id="bottle-size-slider" min="250" max="2500" step="50" value="750">
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-icon"><svg width="32" height="42" viewBox="0 0 100 150" fill="none" stroke="currentColor" stroke-width="12"><path d="M 15 10 L 85 10 L 75 140 C 73 145, 68 150, 50 150 C 32 150, 27 145, 25 140 Z"/></svg></div>
                <div class="setting-content">
                    <span class="setting-label">Μέγεθος Ποτηριού</span>
                    <div id="glass-size-val" class="setting-value">350 ml</div>
                    <input type="range" id="glass-size-slider" min="100" max="500" step="10" value="350">
                </div>
            </div>
            <button class="save-btn" id="save-settings">Αποθήκευση</button>
        </div>
    </div>

    <div id="swipe-container">
        <div class="screen">
            <div class="title-container"><h1 id="bottle-title">Μπουκάλια</h1><p class="subtitle">Άγγιξε για να προσθέσεις</p></div>
            <div class="bottle-grid" id="bottle-grid"></div>
        </div>
        <div class="screen">
            <div class="title-container"><h1 id="glass-title">Ποτήρια</h1><p class="subtitle">Άγγιξε για να προσθέσεις</p></div>
            <div class="glass-grid" id="glass-grid"></div>
        </div>
        <div class="screen">
            <div class="title-container"><h1>Κανάτα</h1><p class="subtitle">Σύρε τον δοσομετρητή στα δεξιά</p></div>
            <div class="pitcher-container">
                <div id="pitcher-wrap">
                    <svg class="svg-obj" viewBox="0 0 200 300">
                        <g clip-path="url(#pitcherMask)"><rect id="pitcher-fill" class="water-fill" x="0" y="0" width="200" height="300" fill="#0a84ff" style="transform: translateY(300px)"/></g>
                        <path d="M 140 100 C 190 90, 200 180, 150 210" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
                        <path d="M 50 30 L 130 30 L 140 100 C 160 150, 160 250, 140 280 C 130 290, 50 290, 40 280 C 20 250, 20 150, 40 100 Z" fill="none" stroke="#ffffff" stroke-width="4"/>
                        <path d="M 40 30 C 30 20, 50 10, 50 30" fill="none" stroke="#ffffff" stroke-width="4"/>
                    </svg>
                    <div class="pitcher-text" id="pitcher-text">0 ml</div>
                </div>
                <div id="pitcher-drag-zone"><div id="indicator-line"></div></div>
            </div>
        </div>
    </div>

    <div class="dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>

    <div id="history-sheet">
        <div class="history-header-tab" id="history-tab">
            <div class="drag-handle"></div><div class="tab-label">Ιστορικό</div>
            <button class="export-btn" id="export-csv">CSV</button>
        </div>
        <div class="history-content" id="history-list-container"></div>
    </div>

    <script>
        let goalMl = parseInt(localStorage.getItem('waterGoal')) || 2000;
        let bStep = parseInt(localStorage.getItem('bottleSize')) || 750;
        let gStep = parseInt(localStorage.getItem('glassSize')) || 350;
        let history = JSON.parse(localStorage.getItem('waterHistory')) || [];

        const getToday = () => new Date().toLocaleDateString('el-GR');
        let today = getToday();
        let todayRecord = history.find(h => h.date === today);
        if (!todayRecord) { todayRecord = { date: today, ml: 0 }; history.unshift(todayRecord); }
        let currentMl = todayRecord.ml || 0;

        function saveData() {
            todayRecord.ml = Math.max(0, currentMl);
            localStorage.setItem('waterGoal', goalMl); localStorage.setItem('bottleSize', bStep); localStorage.setItem('glassSize', gStep); localStorage.setItem('waterHistory', JSON.stringify(history));
        }

        function initUI() {
            document.getElementById('bottle-title').innerText = `Μπουκάλια (${bStep}ml)`;
            document.getElementById('glass-title').innerText = `Ποτήρια (${gStep}ml)`;

            const bGrid = document.getElementById('bottle-grid'); bGrid.innerHTML = '';
            let numB = Math.ceil(goalMl / bStep);
            let bScale = numB > 3 ? 0.9 : 1.1; 
            for (let i = 0; i < numB; i++) {
                const wrap = document.createElement('div'); wrap.className = 'bottle-wrap';
                wrap.style.width = (75 * bScale) + 'px'; wrap.style.height = (150 * bScale) + 'px';
                wrap.innerHTML = `<svg class="svg-obj" viewBox="0 0 100 200"><g clip-path="url(#bottleMask)"><rect class="water-fill" x="0" y="0" width="100" height="200" fill="#0a84ff" style="transform: translateY(200px)"/></g><rect x="40" y="2" width="20" height="8" rx="2" fill="none" stroke="#ffffff" stroke-width="4"/><path d="M 35 30 C 35 15, 40 15, 45 10 L 55 10 C 60 15, 65 15, 65 30 L 75 60 L 75 180 C 75 190, 65 195, 50 195 C 35 195, 25 190, 25 180 L 25 60 Z" fill="none" stroke="#ffffff" stroke-width="4"/><text x="50" y="115" fill="white" font-size="28" font-weight="900" text-anchor="middle" style="text-shadow: 0 2px 4px rgba(0,0,0,0.5)">${i+1}</text></svg>`;
                wrap.onclick = () => { let threshold = (i + 1) * bStep; if (currentMl >= threshold) currentMl = Math.max(0, threshold - bStep); else currentMl = threshold; saveData(); updateUI(); };
                bGrid.appendChild(wrap);
            }

            const gGrid = document.getElementById('glass-grid'); gGrid.innerHTML = '';
            let numG = Math.ceil(goalMl / gStep);
            let gScale = numG > 9 ? 0.8 : 1.0; 
            for (let i = 0; i < numG; i++) {
                const wrap = document.createElement('div'); wrap.className = 'glass-wrap';
                wrap.style.width = (65 * gScale) + 'px'; wrap.style.height = (90 * gScale) + 'px';
                wrap.innerHTML = `<svg class="svg-obj" viewBox="0 0 100 150"><g clip-path="url(#glassMask)"><rect class="water-fill" x="0" y="0" width="100" height="150" fill="#0a84ff" style="transform: translateY(150px)"/></g><path d="M 15 10 L 85 10 L 75 140 C 73 145, 68 150, 50 150 C 32 150, 27 145, 25 140 Z" fill="none" stroke="#ffffff" stroke-width="4"/><text x="50" y="95" fill="white" font-size="32" font-weight="900" text-anchor="middle" style="text-shadow: 0 2px 4px rgba(0,0,0,0.5)">${i+1}</text></svg>`;
                wrap.onclick = () => { let threshold = (i + 1) * gStep; if (currentMl >= threshold) currentMl = Math.max(0, threshold - gStep); else currentMl = threshold; saveData(); updateUI(); };
                gGrid.appendChild(wrap);
            }

            const dragZone = document.getElementById('pitcher-drag-zone'); const indicator = document.getElementById('indicator-line');
            dragZone.innerHTML = ''; dragZone.appendChild(indicator);
            for(let i=0; i<=goalMl; i+=100) {
                const isMajor = (i % 500 === 0); const t = document.createElement('div'); t.className = 'tick' + (isMajor ? ' major' : ''); 
                if (isMajor) t.innerText = i >= 1000 ? (i/1000)+'L' : i; dragZone.appendChild(t);
            }
        }

        function updateUI() {
            const total = Math.max(0, currentMl);
            document.getElementById('global-display').innerText = `${total} / ${goalMl} ml`;
            document.querySelectorAll('#bottle-grid .water-fill').forEach((rect, i) => { let fill = Math.max(0, Math.min(bStep, total - (i * bStep))); rect.style.transform = `translateY(${200 - (fill/bStep * 200)}px)`; });
            document.querySelectorAll('#glass-grid .water-fill').forEach((rect, i) => { let fill = Math.max(0, Math.min(gStep, total - (i * gStep))); rect.style.transform = `translateY(${150 - (fill/gStep * 150)}px)`; });
            
            // Pitcher Fill Logic Fix: Stops exactly at the mask top (y=30)
            let pPercent = Math.min(1, total / goalMl);
            document.getElementById('pitcher-fill').style.transform = `translateY(${300 - (pPercent * 270)}px)`;
            document.getElementById('pitcher-text').innerText = total + ' ml';

            const line = document.getElementById('indicator-line'); const zone = document.getElementById('pitcher-drag-zone');
            const padding = 30; const availableHeight = zone.clientHeight - (padding * 2);
            const bottomPos = padding + (pPercent * availableHeight); line.style.bottom = bottomPos + 'px';
            const container = document.getElementById('history-list-container'); container.innerHTML = '';
            history.forEach(h => {
                const div = document.createElement('div'); div.style.cssText = "display:flex; justify-content:space-between; padding:18px 0; border-bottom:1px solid #2c2c2e; font-size:17px;";
                div.innerHTML = `<span>${h.date === today ? 'Σήμερα' : h.date}</span><span style="color:#0a84ff; font-weight:bold">${h.ml || 0} ml</span>`;
                container.appendChild(div);
            });
        }

        let isDrag = false; const dragZone = document.getElementById('pitcher-drag-zone');
        dragZone.ontouchstart = e => { isDrag = true; handleDrag(e); }; dragZone.ontouchmove = e => { if(isDrag) handleDrag(e); }; dragZone.ontouchend = () => { isDrag = false; saveData(); };
        function handleDrag(e) {
            const rect = dragZone.getBoundingClientRect(); const padding = 30;
            const y = e.touches[0].clientY - rect.top - padding; const availableHeight = rect.height - (padding * 2);
            const percentage = 1 - (y / availableHeight); const clamped = Math.max(0, Math.min(1, percentage));
            currentMl = Math.round((clamped * goalMl) / 50) * 50; updateUI();
        }

        document.getElementById('export-csv').onclick = (e) => {
            e.stopPropagation(); let csv = "Ημερομηνία,Ποσότητα (ml)\n";
            history.forEach(h => { csv += `${h.date},${h.ml}\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.setAttribute("download", "water_history.csv");
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        };

        const mod = document.getElementById('settings-modal'), sliG = document.getElementById('goal-slider'), valG = document.getElementById('goal-val'), sliB = document.getElementById('bottle-size-slider'), valB = document.getElementById('bottle-size-val'), sliGL = document.getElementById('glass-size-slider'), valGL = document.getElementById('glass-size-val');
        document.getElementById('open-settings').onclick = () => { sliG.value = goalMl; valG.innerText = goalMl + ' ml'; sliB.value = bStep; valB.innerText = bStep + ' ml'; sliGL.value = gStep; valGL.innerText = gStep + ' ml'; mod.classList.add('open'); };
        sliG.oninput = e => valG.innerText = e.target.value + ' ml'; sliB.oninput = e => valB.innerText = e.target.value + ' ml'; sliGL.oninput = e => valGL.innerText = e.target.value + ' ml';
        document.getElementById('save-settings').onclick = () => { goalMl = parseInt(sliG.value); bStep = parseInt(sliB.value); gStep = parseInt(sliGL.value); saveData(); mod.classList.remove('open'); initUI(); updateUI(); };

        const sc = document.getElementById('swipe-container'), ds = document.querySelectorAll('.dot');
        sc.onscroll = () => { let i = Math.round(sc.scrollLeft / window.innerWidth); ds.forEach((d, k) => d.classList.toggle('active', k === i)); };
        let sheet = document.getElementById('history-sheet'), hSY = 0;
        document.getElementById('history-tab').ontouchstart = e => { if(e.target.id !== 'export-csv') hSY = e.touches[0].clientY; };
        document.getElementById('history-tab').ontouchend = e => {
            if(e.target.id === 'export-csv') return;
            let endY = e.changedTouches[0].clientY;
            if(hSY - endY > 40) sheet.classList.add('open'); else if(endY - hSY > 40) sheet.classList.remove('open');
        };

        initUI(); updateUI();
    </script>
</body>
</html>
