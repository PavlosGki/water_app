<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Water Tracker</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000; color: #ffffff;
            overflow: hidden; touch-action: none; 
        }

        .top-bar { position: absolute; top: 20px; right: 20px; z-index: 50; }
        .icon-btn { background: none; border: none; color: #8e8e93; padding: 10px; cursor: pointer; }
        
        #settings-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #settings-modal.open { opacity: 1; pointer-events: auto; }
        .settings-box { background: #1c1c1e; padding: 30px; border-radius: 20px; text-align: center; width: 80%; }
        .settings-box input { width: 100%; margin: 20px 0; accent-color: #0a84ff; }
        .save-btn { background: #0a84ff; color: #fff; border: none; padding: 12px 24px; border-radius: 10px; font-weight: bold; width: 100%; }

        #swipe-container {
            display: flex; width: 100vw; height: 100vh;
            overflow-x: auto; scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }
        #swipe-container::-webkit-scrollbar { display: none; }
        
        .screen {
            flex: 0 0 100vw; height: 100vh; scroll-snap-align: start;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        .title-container { text-align: center; position: absolute; top: 60px; width: 100%; }
        h1 { margin: 0; font-size: 26px; font-weight: 700; }
        .subtitle { color: #8e8e93; font-size: 14px; margin-top: 5px; }

        /* Grids */
        .bottle-grid { display: grid; grid-template-columns: repeat(2, 90px); gap: 20px 40px; margin-top: 40px; }
        .bottle-wrap { width: 90px; height: 180px; cursor: pointer; position: relative; }
        .bottle-wrap.center-odd { grid-column: 1 / span 2; justify-self: center; }

        .glass-grid { display: grid; grid-template-columns: repeat(3, 75px); gap: 15px 20px; margin-top: 60px; }
        .glass-wrap { width: 75px; height: 100px; cursor: pointer; position: relative; }

        /* Pitcher */
        .pitcher-container { position: relative; width: 200px; height: 300px; margin-top: 40px; }
        #pitcher-wrap { width: 100%; height: 100%; cursor: ns-resize; touch-action: none; }
        .pitcher-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 32px; font-weight: bold; pointer-events: none; }
        .pitcher-ticks { position: absolute; right: -45px; top: 0; height: 100%; display: flex; flex-direction: column-reverse; justify-content: space-between; }
        .tick { font-size: 12px; color: #8e8e93; display: flex; align-items: center; gap: 5px; }
        .tick::before { content: ''; width: 8px; height: 2px; background: #48484a; }

        .svg-obj { width: 100%; height: 100%; display: block; }
        .water-fill { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Splash */
        .splash-drop { position: absolute; top: 10px; left: 50%; width: 40px; height: 60px; background-color: #0a84ff; border-radius: 50%; pointer-events: none; opacity: 0; z-index: 5; }
        @keyframes splash { 0% { transform: translate(-50%, 0) scale(1); opacity: 1; } 100% { transform: translate(calc(-50% + var(--tx)), var(--ty)) scale(0); opacity: 0; } }

        .dots { position: fixed; bottom: 80px; width: 100vw; display: flex; justify-content: center; gap: 8px; pointer-events: none; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #48484a; transition: 0.3s; }
        .dot.active { background: #f2f2f7; }

        #history-sheet { position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; background-color: #1c1c1e; border-radius: 30px 30px 0 0; z-index: 60; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        #history-sheet.open { transform: translateY(0); }
        .drag-handle { width: 40px; height: 5px; background-color: #48484a; border-radius: 3px; margin: 15px auto; }
        .history-content { padding: 20px 30px; overflow-y: auto; height: 100%; }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <clipPath id="bottleMask"><path d="M 35 30 C 35 15, 40 15, 45 10 L 55 10 C 60 15, 65 15, 65 30 L 75 60 L 75 180 C 75 190, 65 195, 50 195 C 35 195, 25 190, 25 180 L 25 60 Z"/></clipPath>
            <clipPath id="glassMask"><path d="M 15 10 L 85 10 L 75 140 C 73 145, 68 150, 50 150 C 32 150, 27 145, 25 140 Z"/></clipPath>
            <clipPath id="pitcherMask"><path d="M 50 30 L 130 30 L 140 100 C 160 150, 160 250, 140 280 C 130 290, 50 290, 40 280 C 20 250, 20 150, 40 100 Z"/></clipPath>
        </defs>
    </svg>

    <div class="top-bar">
        <button class="icon-btn" id="open-settings"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
    </div>

    <div id="settings-modal">
        <div class="settings-box">
            <h2>Στόχος Νερού</h2>
            <div id="goal-val" style="font-size: 24px; color: #0a84ff; font-weight: bold;">5</div>
            <input type="range" id="goal-slider" min="1" max="5" step="1" value="5">
            <button class="save-btn" id="save-settings">Αποθήκευση</button>
        </div>
    </div>

    <div id="swipe-container">
        <div class="screen">
            <div class="title-container">
                <h1 id="title-bottles">Στόχος: 5 Λίτρα</h1>
                <p class="subtitle">Άγγιξε οποιοδήποτε μπουκάλι (1L)</p>
            </div>
            <div class="bottle-grid" id="bottle-grid"></div>
        </div>

        <div class="screen">
            <div class="title-container">
                <h1>Ποτήρια (350ml)</h1>
                <p class="subtitle">Άγγιξε οποιοδήποτε ποτήρι</p>
            </div>
            <div class="glass-grid" id="glass-grid"></div>
        </div>

        <div class="screen">
            <div class="title-container">
                <h1>Κανάτα</h1>
                <p class="subtitle">Σύρε πάνω/κάτω (±350ml)</p>
            </div>
            <div class="pitcher-container">
                <div id="pitcher-wrap">
                    <svg class="svg-obj" viewBox="0 0 200 300">
                        <g clip-path="url(#pitcherMask)">
                            <rect id="pitcher-fill" class="water-fill" x="0" y="0" width="200" height="300" fill="#0a84ff" style="transform: translateY(300px)"/>
                        </g>
                        <path d="M 140 100 C 190 90, 200 180, 150 210" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
                        <path d="M 50 30 L 130 30 L 140 100 C 160 150, 160 250, 140 280 C 130 290, 50 290, 40 280 C 20 250, 20 150, 40 100 Z" fill="none" stroke="#ffffff" stroke-width="4"/>
                        <path d="M 40 30 C 30 20, 50 10, 50 30" fill="none" stroke="#ffffff" stroke-width="4"/>
                    </svg>
                    <div class="pitcher-text" id="pitcher-text">0.0 L</div>
                </div>
                <div class="pitcher-ticks" id="pitcher-ticks"></div>
            </div>
        </div>
    </div>

    <div class="dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>

    <div id="history-sheet">
        <div class="drag-handle"></div>
        <div class="history-content">
            <h2 style="border-bottom: 1px solid #333; padding-bottom: 10px;">Ιστορικό</h2>
            <ul id="history-list" style="list-style: none; padding: 0;"></ul>
        </div>
    </div>

    <script>
        // --- DATA STATE ---
        let goalLiters = parseInt(localStorage.getItem('waterGoal')) || 5;
        let history = JSON.parse(localStorage.getItem('waterHistory')) || [];
        const getToday = () => new Date().toLocaleDateString('el-GR');
        let today = getToday();
        let todayRecord = history.find(h => h.date === today);

        if (!todayRecord) {
            todayRecord = { date: today, bottleStates: Array(5).fill(false), glassStates: Array(15).fill(false), pitcherExtraMl: 0 };
            history.unshift(todayRecord);
        }

        function calculateTotalMl() {
            let bMl = todayRecord.bottleStates.filter(s => s).length * 1000;
            let gMl = todayRecord.glassStates.filter(s => s).length * 350;
            return bMl + gMl + todayRecord.pitcherExtraMl;
        }

        function saveData() {
            localStorage.setItem('waterGoal', goalLiters);
            localStorage.setItem('waterHistory', JSON.stringify(history));
        }

        // --- UI RENDERERS ---
        function initUI() {
            document.getElementById('title-bottles').innerText = `Στόχος: ${goalLiters} Λίτρα`;
            
            // Bottles
            const bGrid = document.getElementById('bottle-grid');
            bGrid.innerHTML = '';
            for (let i = 0; i < goalLiters; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'bottle-wrap' + (goalLiters % 2 !== 0 && i === goalLiters - 1 ? ' center-odd' : '');
                wrap.innerHTML = `<svg class="svg-obj" viewBox="0 0 100 200"><g clip-path="url(#bottleMask)"><rect class="water-fill" x="0" y="0" width="100" height="200" fill="#0a84ff" style="transform: translateY(200px)"/></g><path d="M 35 30 C 35 15, 40 15, 45 10 L 55 10 C 60 15, 65 15, 65 30 L 75 60 L 75 180 C 75 190, 65 195, 50 195 C 35 195, 25 190, 25 180 L 25 60 Z" fill="none" stroke="#ffffff" stroke-width="4"/><rect x="40" y="2" width="20" height="8" rx="2" fill="none" stroke="#ffffff" stroke-width="4"/><text x="50" y="120" fill="rgba(255,255,255,0.7)" font-size="20" font-weight="bold" text-anchor="middle">1L</text></svg>`;
                wrap.onclick = () => {
                    todayRecord.bottleStates[i] = !todayRecord.bottleStates[i];
                    if(todayRecord.bottleStates[i]) createSplash(wrap);
                    saveData(); updateUI();
                };
                bGrid.appendChild(wrap);
            }

            // Glasses
            const gGrid = document.getElementById('glass-grid');
            gGrid.innerHTML = '';
            let maxG = Math.ceil((goalLiters * 1000) / 350);
            for (let i = 0; i < maxG; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'glass-wrap';
                wrap.innerHTML = `<svg class="svg-obj" viewBox="0 0 100 150"><g clip-path="url(#glassMask)"><rect class="water-fill" x="0" y="0" width="100" height="150" fill="#0a84ff" style="transform: translateY(150px)"/></g><path d="M 15 10 L 85 10 L 75 140 C 73 145, 68 150, 50 150 C 32 150, 27 145, 25 140 Z" fill="none" stroke="#ffffff" stroke-width="4"/><text x="50" y="90" fill="rgba(255,255,255,0.7)" font-size="16" font-weight="bold" text-anchor="middle">350</text></svg>`;
                wrap.onclick = () => {
                    todayRecord.glassStates[i] = !todayRecord.glassStates[i];
                    saveData(); updateUI();
                };
                gGrid.appendChild(wrap);
            }

            // Ticks
            const ticks = document.getElementById('pitcher-ticks');
            ticks.innerHTML = '';
            for(let i=0; i<=goalLiters; i++) {
                const t = document.createElement('div'); t.className = 'tick'; t.innerText = i+'L';
                ticks.appendChild(t);
            }
        }

        function updateUI() {
            const total = calculateTotalMl();
            
            // Sync Bottles (Individual)
            document.querySelectorAll('#bottle-grid .water-fill').forEach((rect, i) => {
                rect.style.transform = todayRecord.bottleStates[i] ? 'translateY(0px)' : 'translateY(200px)';
            });

            // Sync Glasses (Individual)
            document.querySelectorAll('#glass-grid .water-fill').forEach((rect, i) => {
                rect.style.transform = todayRecord.glassStates[i] ? 'translateY(0px)' : 'translateY(150px)';
            });

            // Sync Pitcher (Linear)
            let pPercent = Math.min(1, total / (goalLiters * 1000));
            document.getElementById('pitcher-fill').style.transform = `translateY(${300 - (pPercent * 300)}px)`;
            document.getElementById('pitcher-text').innerText = (total / 1000).toFixed(1) + ' L';

            // History
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            history.forEach(h => {
                // Υπολογισμός ml για παλαιότερα records
                let sum = h.ml || 0;
                if(h.bottleStates) sum = (h.bottleStates.filter(s=>s).length * 1000) + (h.glassStates.filter(s=>s).length * 350) + (h.pitcherExtraMl || 0);
                const li = document.createElement('li');
                li.style.cssText = "display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #222;";
                li.innerHTML = `<span>${h.date === today ? 'Σήμερα' : h.date}</span><span style="color:#0a84ff; font-weight:bold">${(sum/1000).toFixed(1)} L</span>`;
                list.appendChild(li);
            });
        }

        // --- INTERACTION ---
        function createSplash(el) {
            setTimeout(() => {
                for (let i = 0; i < 6; i++) {
                    const d = document.createElement('div'); d.className = 'splash-drop';
                    const tx = (Math.random() - 0.5) * 350, ty = -(Math.random() * 200 + 100);
                    d.style.setProperty('--tx', tx+'px'); d.style.setProperty('--ty', ty+'px');
                    const dur = 0.7 + Math.random() * 0.5;
                    d.style.animation = `splash ${dur}s ease-out forwards`;
                    el.appendChild(d); setTimeout(() => d.remove(), dur * 1000);
                }
            }, 350);
        }

        let isDrag = false, sY = 0, startExtra = 0;
        const pWrap = document.getElementById('pitcher-wrap');
        pWrap.ontouchstart = e => { isDrag = true; sY = e.touches[0].clientY; startExtra = todayRecord.pitcherExtraMl; };
        pWrap.ontouchmove = e => {
            if(!isDrag) return;
            let delta = Math.round((sY - e.touches[0].clientY) / 25);
            todayRecord.pitcherExtraMl = startExtra + (delta * 350);
            updateUI();
        };
        pWrap.ontouchend = () => { isDrag = false; saveData(); };

        // Settings
        const mod = document.getElementById('settings-modal'), sli = document.getElementById('goal-slider'), val = document.getElementById('goal-val');
        document.getElementById('open-settings').onclick = () => { sli.value = goalLiters; val.innerText = goalLiters; mod.classList.add('open'); };
        sli.oninput = e => val.innerText = e.target.value;
        document.getElementById('save-settings').onclick = () => {
            goalLiters = parseInt(sli.value);
            // Reset states αν ο στόχος μειώθηκε
            todayRecord.bottleStates = todayRecord.bottleStates.slice(0, goalLiters);
            while(todayRecord.bottleStates.length < goalLiters) todayRecord.bottleStates.push(false);
            saveData(); mod.classList.remove('open'); initUI(); updateUI();
        };

        // Swipe Dots
        const sc = document.getElementById('swipe-container'), ds = document.querySelectorAll('.dot');
        sc.onscroll = () => { let i = Math.round(sc.scrollLeft / window.innerWidth); ds.forEach((d, k) => d.classList.toggle('active', k === i)); };

        // History Swipe
        let hSY = 0;
        document.body.ontouchstart = e => hSY = e.touches[0].clientY;
        document.body.ontouchend = e => {
            if(hSY - e.changedTouches[0].clientY > 70 && !mod.classList.contains('open')) document.getElementById('history-sheet').classList.add('open');
            if(e.changedTouches[0].clientY - hSY > 70) document.getElementById('history-sheet').classList.remove('open');
        };

        initUI(); updateUI();
    </script>
</body>
</html>
