<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Water Tracker</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000; color: #ffffff;
            overflow: hidden; touch-action: none; 
        }

        /* Header Stats */
        .global-stats {
            position: absolute; top: 25px; left: 20px; z-index: 50;
            font-size: 14px; font-weight: 700; color: #0a84ff; background: rgba(10, 132, 255, 0.15);
            padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(10, 132, 255, 0.4);
        }

        .top-bar { position: absolute; top: 20px; right: 20px; z-index: 50; }
        .icon-btn { background: none; border: none; color: #8e8e93; padding: 10px; cursor: pointer; }
        
        /* Settings - Φαρδύ Slider */
        #settings-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #settings-modal.open { opacity: 1; pointer-events: auto; }
        .settings-box { background: #1c1c1e; padding: 40px 30px; border-radius: 30px; text-align: center; width: 85%; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 35px 0; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 14px; background: #3a3a3c; border-radius: 7px; }
        input[type=range]::-webkit-slider-thumb { 
            height: 36px; width: 36px; border-radius: 50%; background: #0a84ff;
            -webkit-appearance: none; margin-top: -11px; box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .save-btn { background: #0a84ff; color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 16px; }

        /* Swipe Layout */
        #swipe-container { display: flex; width: 100vw; height: 100vh; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        #swipe-container::-webkit-scrollbar { display: none; }
        .screen { flex: 0 0 100vw; height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        .title-container { text-align: center; position: absolute; top: 85px; width: 100%; }
        h1 { margin: 0; font-size: 24px; font-weight: 700; }
        .subtitle { color: #8e8e93; font-size: 13px; margin-top: 5px; }

        /* Grids */
        .bottle-grid { display: grid; grid-template-columns: repeat(2, 90px); gap: 20px 40px; margin-top: 60px; }
        .bottle-wrap { width: 90px; height: 180px; cursor: pointer; position: relative; }
        .bottle-wrap.center-odd { grid-column: 1 / span 2; justify-self: center; }

        .glass-grid { display: grid; grid-template-columns: repeat(3, 75px); gap: 15px 20px; margin-top: 80px; }
        .glass-wrap { width: 75px; height: 100px; cursor: pointer; position: relative; }

        /* Pitcher */
        .pitcher-container { position: relative; width: 240px; height: 320px; margin-top: 60px; display: flex; align-items: center; }
        #pitcher-wrap { width: 160px; height: 260px; position: relative; pointer-events: none; }
        .pitcher-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 19px; font-weight: 900; color: white; text-align: center; width: 100%; }
        
        #pitcher-drag-zone { width: 80px; height: 100%; padding-left: 15px; display: flex; flex-direction: column-reverse; justify-content: space-between; cursor: ns-resize; touch-action: none; }
        .tick { font-size: 11px; color: #8e8e93; display: flex; align-items: center; gap: 6px; }
        .tick::before { content: ''; width: 12px; height: 2px; background: #48484a; }

        .svg-obj { width: 100%; height: 100%; display: block; }
        .water-fill { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(200px); }

        /* Splash */
        .splash-drop { position: absolute; top: 10px; left: 50%; width: 40px; height: 60px; background-color: #0a84ff; border-radius: 50%; pointer-events: none; opacity: 0; z-index: 5; }
        @keyframes splash { 0% { transform: translate(-50%, 0) scale(1); opacity: 1; } 100% { transform: translate(calc(-50% + var(--tx)), var(--ty)) scale(0); opacity: 0; } }

        /* Dots & History */
        .dots { position: fixed; bottom: 90px; width: 100vw; display: flex; justify-content: center; gap: 8px; z-index: 10; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #48484a; transition: 0.3s; }
        .dot.active { background: #f2f2f7; }

        #history-sheet { position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; background-color: #1c1c1e; border-radius: 30px 30px 0 0; z-index: 60; transform: translateY(calc(100% - 65px)); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); box-shadow: 0 -10px 40px rgba(0,0,0,0.6); }
        #history-sheet.open { transform: translateY(0); }
        .history-header-tab { height: 65px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .drag-handle { width: 36px; height: 5px; background-color: #48484a; border-radius: 3px; margin-bottom: 8px; }
        .tab-label { font-size: 11px; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: 1.5px; }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <clipPath id="bottleMask"><path d="M 35 30 C 35 15, 40 15, 45 10 L 55 10 C 60 15, 65 15, 65 30 L 75 60 L 75 180 C 75 190, 65 195, 50 195 C 35 195, 25 190, 25 180 L 25 60 Z"/></clipPath>
            <clipPath id="glassMask"><path d="M 15 10 L 85 10 L 75 140 C 73 145, 68 150, 50 150 C 32 150, 27 145, 25 140 Z"/></clipPath>
            <clipPath id="pitcherMask"><path d="M 50 30 L 130 30 L 140 100 C 160 150, 160 250, 140 280 C 130 290, 50 290, 40 280 C 20 250, 20 150, 40 100 Z"/></clipPath>
        </defs>
    </svg>

    <div class="global-stats" id="global-display">0 / 5250 ml</div>

    <div class="top-bar">
        <button class="icon-btn" id="open-settings"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
    </div>

    <div id="settings-modal">
        <div class="settings-box">
            <h2>Στόχος (ml)</h2>
            <div id="goal-val" style="font-size: 36px; color: #0a84ff; font-weight: 800;">5250</div>
            <input type="range" id="goal-slider" min="1050" max="7000" step="350" value="5250">
            <button class="save-btn" id="save-settings">Αποθήκευση</button>
        </div>
    </div>

    <div id="swipe-container">
        <div class="screen">
            <div class="title-container"><h1>Μπουκάλια (1L)</h1><p class="subtitle">Ανεξάρτητη επιλογή</p></div>
            <div class="bottle-grid" id="bottle-grid"></div>
        </div>
        <div class="screen">
            <div class="title-container"><h1>Ποτήρια (350ml)</h1><p class="subtitle">Ανεξάρτητη επιλογή</p></div>
            <div class="glass-grid" id="glass-grid"></div>
        </div>
        <div class="screen">
            <div class="title-container"><h1>Κανάτα</h1><p class="subtitle">Σύρε τον δοσομετρητή (±350ml)</p></div>
            <div class="pitcher-container">
                <div id="pitcher-wrap">
                    <svg class="svg-obj" viewBox="0 0 200 300">
                        <g clip-path="url(#pitcherMask)">
                            <rect id="pitcher-fill" class="water-fill" x="0" y="0" width="200" height="300" fill="#0a84ff" style="transform: translateY(300px)"/>
                        </g>
                        <path d="M 140 100 C 190 90, 200 180, 150 210" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
                        <path d="M 50 30 L 130 30 L 140 100 C 160 150, 160 250, 140 280 C 130 290, 50 290, 40 280 C 20 250, 20 150, 40 100 Z" fill="none" stroke="#ffffff" stroke-width="4"/>
                        <path d="M 40 30 C 30 20, 50 10, 50 30" fill="none" stroke="#ffffff" stroke-width="4"/>
                    </svg>
                    <div class="pitcher-text" id="pitcher-text">0 ml</div>
                </div>
                <div id="pitcher-drag-zone"></div>
            </div>
        </div>
    </div>

    <div class="dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>

    <div id="history-sheet">
        <div class="history-header-tab" id="history-tab">
            <div class="drag-handle"></div>
            <div class="tab-label">Ιστορικό</div>
        </div>
        <div class="history-content" id="history-list-container" style="padding: 0 30px 40px;"></div>
    </div>

    <script>
        const STEP = 350;
        let goalMl = parseInt(localStorage.getItem('waterGoal')) || 5250;
        let history = JSON.parse(localStorage.getItem('waterHistory')) || [];
        const getToday = () => new Date().toLocaleDateString('el-GR');
        let today = getToday();
        let todayRecord = history.find(h => h.date === today);

        if (!todayRecord) {
            todayRecord = { date: today, bottleStates: Array(7).fill(false), glassStates: Array(20).fill(false), pitcherExtraMl: 0 };
            history.unshift(todayRecord);
        }

        // Εξασφάλιση ότι υπάρχουν τα states
        if(!todayRecord.bottleStates) todayRecord.bottleStates = Array(7).fill(false);
        if(!todayRecord.glassStates) todayRecord.glassStates = Array(20).fill(false);
        if(!todayRecord.pitcherExtraMl) todayRecord.pitcherExtraMl = 0;

        function calculateTotal() {
            let b = todayRecord.bottleStates.filter(s => s).length * 1000;
            let g = todayRecord.glassStates.filter(s => s).length * 350;
            return b + g + todayRecord.pitcherExtraMl;
        }

        function saveData() {
            todayRecord.ml = calculateTotal(); // Αποθηκεύουμε το σύνολο για το ιστορικό
            localStorage.setItem('waterGoal', goalMl);
            localStorage.setItem('waterHistory', JSON.stringify(history));
        }

        function initUI() {
            // Bottles
            const bGrid = document.getElementById('bottle-grid');
            bGrid.innerHTML = '';
            let numB = Math.ceil(goalMl / 1000);
            for (let i = 0; i < numB; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'bottle-wrap' + (numB % 2 !== 0 && i === numB - 1 ? ' center-odd' : '');
                wrap.innerHTML = `
                    <svg class="svg-obj" viewBox="0 0 100 200">
                        <g clip-path="url(#bottleMask)">
                            <rect class="water-fill" x="0" y="0" width="100" height="200" fill="#0a84ff" style="transform: translateY(200px)"/>
                        </g>
                        <rect x="40" y="2" width="20" height="8" rx="2" fill="none" stroke="#ffffff" stroke-width="4"/>
                        <path d="M 35 30 C 35 15, 40 15, 45 10 L 55 10 C 60 15, 65 15, 65 30 L 75 60 L 75 180 C 75 190, 65 195, 50 195 C 35 195, 25 190, 25 180 L 25 60 Z" fill="none" stroke="#ffffff" stroke-width="4"/>
                        <text x="50" y="125" fill="rgba(255,255,255,0.7)" font-size="18" font-weight="bold" text-anchor="middle">1L</text>
                    </svg>`;
                wrap.onclick = () => {
                    todayRecord.bottleStates[i] = !todayRecord.bottleStates[i];
                    if(todayRecord.bottleStates[i]) createSplash(wrap);
                    saveData(); updateUI();
                };
                bGrid.appendChild(wrap);
            }

            // Glasses
            const gGrid = document.getElementById('glass-grid');
            gGrid.innerHTML = '';
            let numG = Math.ceil(goalMl / STEP);
            for (let i = 0; i < numG; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'glass-wrap';
                wrap.innerHTML = `
                    <svg class="svg-obj" viewBox="0 0 100 150">
                        <g clip-path="url(#glassMask)">
                            <rect class="water-fill" x="0" y="0" width="100" height="150" fill="#0a84ff" style="transform: translateY(150px)"/>
                        </g>
                        <path d="M 15 10 L 85 10 L 75 140 C 73 145, 68 150, 50 150 C 32 150, 27 145, 25 140 Z" fill="none" stroke="#ffffff" stroke-width="4"/>
                        <text x="50" y="90" fill="rgba(255,255,255,0.6)" font-size="14" font-weight="bold" text-anchor="middle">350</text>
                    </svg>`;
                wrap.onclick = () => {
                    todayRecord.glassStates[i] = !todayRecord.glassStates[i];
                    saveData(); updateUI();
                };
                gGrid.appendChild(wrap);
            }

            // Pitcher Ticks
            const ticks = document.getElementById('pitcher-drag-zone');
            ticks.innerHTML = '';
            let numTicks = Math.floor(goalMl / 1000);
            for(let i=0; i<=numTicks; i++) {
                const t = document.createElement('div'); t.className = 'tick'; t.innerText = i+'L';
                ticks.appendChild(t);
            }
        }

        function updateUI() {
            const total = calculateTotal();
            document.getElementById('global-display').innerText = `${total} / ${goalMl} ml`;

            // Sync Bottles (Independent Toggle)
            document.querySelectorAll('#bottle-grid .water-fill').forEach((rect, i) => {
                rect.style.transform = todayRecord.bottleStates[i] ? 'translateY(0px)' : 'translateY(200px)';
            });

            // Sync Glasses (Independent Toggle)
            document.querySelectorAll('#glass-grid .water-fill').forEach((rect, i) => {
                rect.style.transform = todayRecord.glassStates[i] ? 'translateY(0px)' : 'translateY(150px)';
            });

            // Pitcher (Linear Sync with total)
            let pPercent = Math.min(1, total / goalMl);
            document.getElementById('pitcher-fill').style.transform = `translateY(${300 - (pPercent * 300)}px)`;
            document.getElementById('pitcher-text').innerText = total + ' ml';

            // History
            const container = document.getElementById('history-list-container');
            container.innerHTML = '';
            history.forEach(h => {
                const div = document.createElement('div');
                div.style.cssText = "display:flex; justify-content:space-between; padding:18px 0; border-bottom:1px solid #2c2c2e; font-size:17px;";
                div.innerHTML = `<span>${h.date === today ? 'Σήμερα' : h.date}</span><span style="color:#0a84ff; font-weight:bold">${h.ml || 0} ml</span>`;
                container.appendChild(div);
            });
        }

        function createSplash(el) {
            setTimeout(() => {
                for (let i = 0; i < 6; i++) {
                    const d = document.createElement('div'); d.className = 'splash-drop';
                    const tx = (Math.random() - 0.5) * 350, ty = -(Math.random() * 200 + 100);
                    d.style.setProperty('--tx', tx+'px'); d.style.setProperty('--ty', ty+'px');
                    const dur = 0.7 + Math.random() * 0.5;
                    d.style.animation = `splash ${dur}s ease-out forwards`;
                    el.appendChild(d); setTimeout(() => d.remove(), dur * 1000);
                }
            }, 350);
        }

        // Pitcher Drag Logic
        let isDrag = false, sY = 0, startExtra = 0;
        const dragZone = document.getElementById('pitcher-drag-zone');
        dragZone.ontouchstart = e => { isDrag = true; sY = e.touches[0].clientY; startExtra = todayRecord.pitcherExtraMl; };
        dragZone.ontouchmove = e => {
            if(!isDrag) return;
            let deltaSteps = Math.round((sY - e.touches[0].clientY) / 25);
            todayRecord.pitcherExtraMl = startExtra + (deltaSteps * STEP);
            updateUI();
        };
        dragZone.ontouchend = () => { isDrag = false; saveData(); };

        // Settings Modal
        const mod = document.getElementById('settings-modal'), sli = document.getElementById('goal-slider'), val = document.getElementById('goal-val');
        document.getElementById('open-settings').onclick = () => { sli.value = goalMl; val.innerText = goalMl; mod.classList.add('open'); };
        sli.oninput = e => val.innerText = e.target.value;
        document.getElementById('save-settings').onclick = () => {
            goalMl = parseInt(sli.value); 
            saveData(); mod.classList.remove('open'); initUI(); updateUI();
        };

        // Swipe & Dots
        const sc = document.getElementById('swipe-container'), ds = document.querySelectorAll('.dot');
        sc.onscroll = () => { let i = Math.round(sc.scrollLeft / window.innerWidth); ds.forEach((d, k) => d.classList.toggle('active', k === i)); };

        // History Swipe
        let sheet = document.getElementById('history-sheet'), hSY = 0;
        document.getElementById('history-tab').ontouchstart = e => hSY = e.touches[0].clientY;
        document.getElementById('history-tab').ontouchend = e => {
            let endY = e.changedTouches[0].clientY;
            if(hSY - endY > 40) sheet.classList.add('open');
            else if(endY - hSY > 40) sheet.classList.remove('open');
        };

        initUI(); updateUI();
    </script>
</body>
</html>
