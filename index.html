<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Water Tracker</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: -apple-system, sans-serif; background-color: #000; color: #fff; overflow: hidden; touch-action: none; }
        
        .global-stats {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%); z-index: 50;
            font-size: 14px; font-weight: 700; color: #0a84ff; background: rgba(10, 132, 255, 0.1);
            padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(10, 132, 255, 0.3);
            white-space: nowrap; transition: 0.1s;
        }

        /* Fast Sick Blink */
        .goal-complete {
            background: #fff !important; color: #000 !important;
            box-shadow: 0 0 30px #fff;
            animation: fast-pulse 0.1s ease-in-out 4;
        }
        @keyframes fast-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .top-bar { position: absolute; top: 20px; left: 15px; z-index: 50; }
        .icon-btn { background: none; border: none; color: #8e8e93; padding: 10px; cursor: pointer; }
        
        #settings-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        #settings-modal.open { opacity: 1; pointer-events: auto; }
        .settings-box { background: #1c1c1e; padding: 30px; border-radius: 30px; width: 90%; }
        .save-btn { background: #0a84ff; color: #fff; border: none; padding: 16px; border-radius: 15px; font-weight: bold; width: 100%; margin-top: 20px; }

        #swipe-container { display: flex; width: 100vw; height: 100vh; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: auto; }
        #swipe-container::-webkit-scrollbar { display: none; }
        .screen { flex: 0 0 100vw; height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .title-container { text-align: center; position: absolute; top: 85px; width: 100%; z-index: 5; }
        h1 { margin: 0; font-size: 22px; font-weight: 800; }
        .subtitle { color: #8e8e93; font-size: 13px; margin-top: 5px; }

        /* Horizontal Weekly Grid */
        .weekly-grid { display: flex; flex-direction: column; width: 85%; gap: 15px; margin-top: 60px; }
        .week-row { display: flex; align-items: center; gap: 12px; width: 100%; }
        .week-label { width: 35px; font-size: 11px; color: #8e8e93; font-weight: 700; text-transform: uppercase; }
        .week-bar-bg { flex: 1; height: 12px; background: #1c1c1e; border-radius: 6px; position: relative; overflow: hidden; }
        .week-bar-fill { position: absolute; left: 0; height: 100%; background: #0a84ff; transition: width 1s ease; }

        .bottle-grid, .glass-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 90%; height: 55vh; margin-top: 60px; }
        .bottle-wrap, .glass-wrap { position: relative; cursor: pointer; }
        .water-fill { transition: transform 0.4s ease-out; }

        /* Splash Effect (Slower & Larger) */
        .drop { position: absolute; width: 12px; height: 12px; background: #0a84ff; border-radius: 50%; pointer-events: none; z-index: 99; }

        .pitcher-container { position: relative; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #pitcher-drag-zone { position: absolute; right: 0; top: 140px; bottom: 160px; width: 100px; background: #1c1c1e; border-radius: 30px 0 0 30px; display: flex; flex-direction: column-reverse; justify-content: space-between; padding: 25px 0; }
        #indicator-line { position: absolute; left: 0; right: 0; height: 3px; background: #ff3b30; z-index: 15; }
        .dots { position: fixed; bottom: 85px; width: 100vw; display: flex; justify-content: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: 0.3s; }
        .dot.active { background: #fff; }
        #history-sheet { position: fixed; bottom: 0; width: 100%; height: 85vh; background: #1c1c1e; border-radius: 30px 30px 0 0; transform: translateY(calc(100% - 65px)); transition: 0.4s; z-index: 60; }
        #history-sheet.open { transform: translateY(0); }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position: absolute;"><defs>
        <clipPath id="bottleMask"><path d="M 35 30 C 35 15, 40 15, 45 10 L 55 10 C 60 15, 65 15, 65 30 L 75 60 L 75 180 C 75 190, 65 195, 50 195 C 35 195, 25 190, 25 180 L 25 60 Z"/></clipPath>
        <clipPath id="glassMask"><path d="M 15 10 L 85 10 L 75 140 C 73 145, 68 150, 50 150 C 32 150, 27 145, 25 140 Z"/></clipPath>
        <clipPath id="pitcherMask"><path d="M 50 30 L 130 30 L 140 100 C 160 150, 160 250, 140 280 C 130 290, 50 290, 40 280 C 20 250, 20 150, 40 100 Z"/></clipPath>
    </defs></svg>

    <div id="swipe-container">
        <div class="screen">
            <div class="title-container"><h1>Status Εβδομάδας</h1><p class="subtitle">Η πρόοδός σου ανά ημέρα</p></div>
            <div class="weekly-grid" id="weekly-grid"></div>
        </div>

        <div class="screen">
            <div class="title-container"><h1 id="bottle-title">Μπουκάλια</h1><p class="subtitle">Άγγιξε για να προσθέσεις</p></div>
            <div class="bottle-grid" id="bottle-grid"></div>
        </div>

        <div class="screen">
            <div class="title-container"><h1 id="glass-title">Ποτήρια</h1><p class="subtitle">Άγγιξε για να προσθέσεις</p></div>
            <div class="glass-grid" id="glass-grid"></div>
        </div>

        <div class="screen">
            <div class="title-container"><h1>Κανάτα</h1><p class="subtitle">Σύρε τον δοσομετρητή δεξιά</p></div>
            <div class="pitcher-container">
                <div id="pitcher-wrap">
                    <svg class="svg-obj" viewBox="0 0 200 300">
                        <g clip-path="url(#pitcherMask)"><rect id="pitcher-fill" class="water-fill" width="200" height="300" fill="#0a84ff" style="transform:translateY(300px)"/></g>
                        <path d="M 140 100 C 190 90, 200 180, 150 210" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
                        <path d="M 50 30 L 130 30 L 140 100 C 160 150, 160 250, 140 280 C 130 290, 50 290, 40 280 C 20 250, 20 150, 40 100 Z" fill="none" stroke="#fff" stroke-width="4"/>
                    </svg>
                    <div class="pitcher-text" id="pitcher-text">0 ml</div>
                </div>
                <div id="pitcher-drag-zone"><div id="indicator-line"></div></div>
            </div>
        </div>
    </div>

    <div class="dots"><div class="dot"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>

    <div id="history-sheet">
        <div class="history-header-tab" id="history-tab"><div class="drag-handle"></div><div class="tab-label">Ιστορικό</div></div>
        <div class="history-content" id="history-list-container"></div>
    </div>

    <script>
        let goalMl = parseInt(localStorage.getItem('waterGoal')) || 2000;
        let bStep = parseInt(localStorage.getItem('bottleSize')) || 750;
        let gStep = parseInt(localStorage.getItem('glassSize')) || 350;
        let history = JSON.parse(localStorage.getItem('waterHistory')) || [];

        const getToday = () => new Date().toLocaleDateString('el-GR');
        let today = getToday();
        let todayRecord = history.find(h => h.date === today);
        if (!todayRecord) { todayRecord = { date: today, ml: 0, goal: goalMl }; history.unshift(todayRecord); }
        let currentMl = todayRecord.ml || 0;

        // Audio Management
        let audioCtx;
        function unlockAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSuccess() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        // Accurate Splash from mouth
        function launchSplash(element, isBottle) {
            const rect = element.getBoundingClientRect();
            // Bottle mouth is at 5% height, Glass mouth at 5% height
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + (rect.height * 0.05);

            for(let i=0; i<6; i++) {
                const d = document.createElement('div'); d.className = 'drop';
                document.body.appendChild(d); d.style.left = startX + 'px'; d.style.top = startY + 'px';
                const vx = (Math.random() - 0.5) * 80; const vy = -80 - Math.random() * 80;
                d.animate([
                    { transform: 'translate(0,0)', opacity: 1 },
                    { transform: `translate(${vx}px, ${vy}px)`, opacity: 0.8, offset: 0.4 },
                    { transform: `translate(${vx*1.2}px, 300px)`, opacity: 0 }
                ], { duration: 1200 + Math.random()*400, easing: 'cubic-bezier(0.2, 0, 0.2, 1)' });
                setTimeout(() => d.remove(), 1600);
            }
        }

        function checkGoal(prev) {
            if (currentMl >= goalMl && prev < goalMl) {
                playSuccess();
                const display = document.getElementById('global-display');
                display.classList.add('goal-complete');
                setTimeout(() => display.classList.remove('goal-complete'), 600);
            }
        }

        function saveData() {
            todayRecord.ml = Math.max(0, currentMl);
            todayRecord.goal = goalMl;
            localStorage.setItem('waterGoal', goalMl); localStorage.setItem('bottleSize', bStep);
            localStorage.setItem('glassSize', gStep); localStorage.setItem('waterHistory', JSON.stringify(history));
            updateWeekly();
        }

        function initUI() {
            // Set Landing Screen to Bottle (Screen Index 1)
            const sc = document.getElementById('swipe-container');
            sc.scrollLeft = window.innerWidth;

            document.getElementById('bottle-title').innerText = `Μπουκάλια (${bStep}ml)`;
            document.getElementById('glass-title').innerText = `Ποτήρια (${gStep}ml)`;
            
            const bGrid = document.getElementById('bottle-grid'); bGrid.innerHTML = '';
            for (let i = 0; i < Math.ceil(goalMl / bStep); i++) {
                const wrap = document.createElement('div'); wrap.className = 'bottle-wrap';
                wrap.style.cssText = "width:75px; height:150px;";
                wrap.innerHTML = `<svg class="svg-obj" viewBox="0 0 100 200"><g clip-path="url(#bottleMask)"><rect class="water-fill" width="100" height="200" fill="#0a84ff" style="transform:translateY(200px)"/></g><path d="M 35 30 C 35 15, 40 15, 45 10 L 55 10 C 60 15, 65 15, 65 30 L 75 60 L 75 180 C 75 190, 65 195, 50 195 C 35 195, 25 190, 25 180 L 25 60 Z" fill="none" stroke="#fff" stroke-width="4"/><text x="50" y="115" fill="white" font-size="28" font-weight="900" text-anchor="middle">${i+1}</text></svg>`;
                wrap.onclick = () => { 
                    unlockAudio(); let prev = currentMl; let target = (i+1)*bStep;
                    currentMl = currentMl >= target ? Math.max(0, target-bStep) : target;
                    launchSplash(wrap, true); checkGoal(prev); saveData(); updateUI();
                };
                bGrid.appendChild(wrap);
            }
            
            const gGrid = document.getElementById('glass-grid'); gGrid.innerHTML = '';
            for (let i = 0; i < Math.ceil(goalMl / gStep); i++) {
                const wrap = document.createElement('div'); wrap.className = 'glass-wrap';
                wrap.style.cssText = "width:65px; height:90px;";
                wrap.innerHTML = `<svg class="svg-obj" viewBox="0 0 100 150"><g clip-path="url(#glassMask)"><rect class="water-fill" width="100" height="150" fill="#0a84ff" style="transform:translateY(150px)"/></g><path d="M 15 10 L 85 10 L 75 140 C 73 145, 68 150, 50 150 C 32 150, 27 145, 25 140 Z" fill="none" stroke="#fff" stroke-width="4"/><text x="50" y="95" fill="white" font-size="32" font-weight="900" text-anchor="middle">${i+1}</text></svg>`;
                wrap.onclick = () => {
                    unlockAudio(); let prev = currentMl; let target = (i+1)*gStep;
                    currentMl = currentMl >= target ? Math.max(0, target-gStep) : target;
                    launchSplash(wrap, false); checkGoal(prev); saveData(); updateUI();
                };
                gGrid.appendChild(wrap);
            }
            updateWeekly();
        }

        function updateWeekly() {
            const grid = document.getElementById('weekly-grid'); grid.innerHTML = '';
            const days = ['ΚΥΡ','ΔΕΥ','ΤΡΙ','ΤΕΤ','ΠΕΜ','ΠΑΡ','ΣΑΒ'];
            const now = new Date();
            for(let i=0; i<7; i++) {
                const d = new Date(); d.setDate(now.getDate() - (now.getDay() === 0 ? 6 : now.getDay() - 1) + i); // Start from Monday
                const ds = d.toLocaleDateString('el-GR');
                const rec = history.find(h => h.date === ds);
                const perc = rec ? Math.min(100, (rec.ml / (rec.goal || goalMl)) * 100) : 0;
                
                const row = document.createElement('div'); row.className = 'week-row';
                row.innerHTML = `<div class="week-label">${days[d.getDay()]}</div><div class="week-bar-bg"><div class="week-bar-fill" style="width:${perc}%"></div></div>`;
                grid.appendChild(row);
            }
        }

        function updateUI() {
            const total = Math.max(0, currentMl);
            document.getElementById('global-display').innerText = `${total} / ${goalMl} ml`;
            document.querySelectorAll('#bottle-grid .water-fill').forEach((rect, i) => { let fill = Math.max(0, Math.min(bStep, total - (i * bStep))); rect.style.transform = `translateY(${200 - (fill/bStep * 200)}px)`; });
            document.querySelectorAll('#glass-grid .water-fill').forEach((rect, i) => { let fill = Math.max(0, Math.min(gStep, total - (i * gStep))); rect.style.transform = `translateY(${150 - (fill/gStep * 150)}px)`; });
            let pPercent = Math.min(1, total / goalMl);
            document.getElementById('pitcher-fill').style.transform = `translateY(${300 - (pPercent * 270)}px)`;
            document.getElementById('pitcher-text').innerText = total + ' ml';
            document.getElementById('indicator-line').style.bottom = (30 + (pPercent * (document.getElementById('pitcher-drag-zone').clientHeight - 60))) + 'px';
        }

        const dragZone = document.getElementById('pitcher-drag-zone');
        dragZone.ontouchmove = e => {
            unlockAudio(); let prev = currentMl; const rect = dragZone.getBoundingClientRect();
            const y = e.touches[0].clientY - rect.top - 25;
            const perc = 1 - (y / (rect.height - 50));
            currentMl = Math.round((Math.max(0, Math.min(1, perc)) * goalMl) / 50) * 50;
            checkGoal(prev); updateUI();
        };
        dragZone.ontouchend = () => saveData();

        document.getElementById('open-settings').onclick = () => document.getElementById('settings-modal').classList.add('open');
        document.getElementById('save-settings').onclick = () => { goalMl = parseInt(document.getElementById('goal-slider').value); saveData(); document.getElementById('settings-modal').classList.remove('open'); initUI(); updateUI(); };
        
        const sc = document.getElementById('swipe-container'), ds = document.querySelectorAll('.dot');
        sc.onscroll = () => { let i = Math.round(sc.scrollLeft / window.innerWidth); ds.forEach((d, k) => d.classList.toggle('active', k === i)); };

        // Handle initial Landing scroll after slight delay
        window.onload = () => setTimeout(initUI, 100);
    </script>
</body>
</html>
