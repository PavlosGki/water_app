<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Water Tracker">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>Water Tracker</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000; color: #ffffff;
            overflow: hidden; touch-action: none; 
        }

        .top-bar { position: absolute; top: 20px; left: 15px; z-index: 50; }
        
        .global-stats {
            position: absolute; top: 25px; left: 50%; transform: translateX(-50%); z-index: 50;
            font-size: 14px; font-weight: 700; color: #0a84ff; background: rgba(10, 132, 255, 0.15);
            padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(10, 132, 255, 0.4);
            white-space: nowrap; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* SIC BLINK EFFECT */
        .goal-blink { animation: blink-anim 0.4s ease-out; }
        @keyframes blink-anim {
            0% { background: rgba(10, 132, 255, 0.15); transform: translateX(-50%) scale(1); }
            30% { background: #ffffff; color: #000000; box-shadow: 0 0 30px #ffffff; transform: translateX(-50%) scale(1.15); border-color: #ffffff; }
            100% { background: rgba(10, 132, 255, 0.15); transform: translateX(-50%) scale(1); }
        }

        .icon-btn { background: none; border: none; color: #8e8e93; padding: 10px; cursor: pointer; }
        
        #settings-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #settings-modal.open { opacity: 1; pointer-events: auto; }
        .settings-box { background: #1c1c1e; padding: 30px; border-radius: 30px; width: 90%; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 12px 0; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 6px; background: #3a3a3c; border-radius: 3px; }
        input[type=range]::-webkit-slider-thumb { height: 26px; width: 26px; border-radius: 50%; background: #0a84ff; -webkit-appearance: none; margin-top: -10px; }

        .save-btn { background: #0a84ff; color: #fff; border: none; padding: 16px; border-radius: 15px; font-weight: bold; width: 100%; font-size: 16px; margin-top: 20px; }

        #swipe-container { display: flex; width: 100vw; height: 100vh; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: auto; }
        #swipe-container::-webkit-scrollbar { display: none; }
        .screen { flex: 0 0 100vw; height: 100vh; scroll-snap-align: start; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

        .title-container { text-align: center; position: absolute; top: 85px; width: 100%; z-index: 5; }
        h1 { margin: 0; font-size: 22px; font-weight: 700; }
        .subtitle { color: #8e8e93; font-size: 13px; margin-top: 5px; }

        /* Weekly Status - ΔΕΥ to ΚΥΡ */
        .weekly-grid { display: flex; flex-direction: column; width: 92%; gap: 12px; margin-top: 60px; }
        .week-row { display: flex; align-items: center; gap: 10px; width: 100%; }
        .week-label { width: 35px; font-size: 11px; color: #8e8e93; font-weight: 800; text-transform: uppercase; }
        .week-bar-bg { flex: 1; height: 32px; background: #1c1c1e; border-radius: 8px; position: relative; overflow: hidden; display: flex; align-items: center; }
        .week-bar-fill { position: absolute; left: 0; height: 100%; background: #0a84ff; transition: width 0.8s ease-out; }
        .week-bar-text { position: relative; z-index: 2; width: 100%; text-align: center; font-size: 12px; font-weight: 700; color: #ffffff; text-shadow: 0 1px 4px rgba(0,0,0,0.8); pointer-events: none; }

        .bottle-grid, .glass-grid { display: grid; grid-template-columns: repeat(3, 1fr); justify-items: center; align-content: center; width: 92%; max-width: 500px; height: 60vh; margin-top: 50px; gap: 20px; }
        .bottle-wrap, .glass-wrap { cursor: pointer; position: relative; }

        .pitcher-container { position: relative; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #pitcher-wrap { width: 260px; height: 380px; position: relative; touch-action: none; cursor: ns-resize; }
        .pitcher-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 22px; font-weight: 900; color: white; text-align: center; width: 100%; text-shadow: 0 2px 10px rgba(0,0,0,0.8); pointer-events: none; }
        
        .svg-obj { width: 100%; height: 100%; display: block; pointer-events: none; }
        .water-fill { transition: transform 0.3s ease-out; }

        .dots { position: fixed; bottom: 85px; width: 100vw; display: flex; justify-content: center; gap: 8px; z-index: 5; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #48484a; transition: 0.3s; }
        .dot.active { background: #f2f2f7; }

        #history-sheet { position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; background-color: #1c1c1e; border-radius: 30px 30px 0 0; z-index: 60; transform: translateY(calc(100% - 65px)); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        #history-sheet.open { transform: translateY(0); }
        .history-header-tab { height: 65px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .drag-handle { width: 36px; height: 5px; background-color: #48484a; border-radius: 3px; margin-bottom: 8px; }
        .export-btn { position: absolute; right: 20px; top: 15px; background: rgba(255,255,255,0.05); color: #0a84ff; border: 1px solid rgba(10, 132, 255, 0.3); padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <clipPath id="bottleMask"><path d="M 35 30 C 35 15, 40 15, 45 10 L 55 10 C 60 15, 65 15, 65 30 L 75 60 L 75 180 C 75 190, 65 195, 50 195 C 35 195, 25 190, 25 180 L 25 60 Z"/></clipPath>
            <clipPath id="glassMask"><path d="M 15 10 L 85 10 L 75 140 C 73 145, 68 150, 50 150 C 32 150, 27 145, 25 140 Z"/></clipPath>
            <clipPath id="pitcherMask"><path d="M 50 30 L 130 30 L 140 100 C 160 150, 160 250, 140 280 C 130 290, 50 290, 40 280 C 20 250, 20 150, 40 100 Z"/></clipPath>
        </defs>
    </svg>

    <div class="global-stats" id="global-display">0 / 2000 ml</div>

    <div class="top-bar">
        <button class="icon-btn" id="open-settings">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
    </div>

    <div id="settings-modal">
        <div class="settings-box">
            <h2 style="margin:0 0 20px">Ρυθμίσεις Στόχου</h2>
            <div id="goal-val" style="font-size:24px; color:#0a84ff; font-weight:800; margin-bottom:10px">2000 ml</div>
            <input type="range" id="goal-slider" min="500" max="5000" step="100" value="2000">
            <button class="save-btn" id="save-settings">Αποθήκευση</button>
        </div>
    </div>

    <div id="swipe-container">
        <div class="screen">
            <div class="title-container"><h1>Status Εβδομάδας</h1><p class="subtitle">Σύνοψη κατανάλωσης</p></div>
            <div class="weekly-grid" id="weekly-grid"></div>
        </div>
        <div class="screen">
            <div class="title-container"><h1 id="bottle-title">Μπουκάλια</h1><p class="subtitle">Άγγιξε για να προσθέσεις</p></div>
            <div class="bottle-grid" id="bottle-grid"></div>
        </div>
        <div class="screen">
            <div class="title-container"><h1 id="glass-title">Ποτήρια</h1><p class="subtitle">Άγγιξε για να προσθέσεις</p></div>
            <div class="glass-grid" id="glass-grid"></div>
        </div>
        <div class="screen">
            <div class="title-container"><h1>Κανάτα</h1><p class="subtitle">Σύρε το δάχτυλο πάνω στην κανάτα</p></div>
            <div class="pitcher-container">
                <div id="pitcher-wrap">
                    <svg class="svg-obj" viewBox="0 0 200 300">
                        <g clip-path="url(#pitcherMask)"><rect id="pitcher-fill" class="water-fill" x="0" y="0" width="200" height="300" fill="#0a84ff" style="transform: translateY(300px)"/></g>
                        <path d="M 140 100 C 190 90, 200 180, 150 210" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
                        <path d="M 50 30 L 130 30 L 140 100 C 160 150, 160 250, 140 280 C 130 290, 50 290, 40 280 C 20 250, 20 150, 40 100 Z" fill="none" stroke="#ffffff" stroke-width="4"/>
                    </svg>
                    <div class="pitcher-text" id="pitcher-text">0 ml</div>
                </div>
            </div>
        </div>
    </div>

    <div class="dots"><div class="dot"></div><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div>

    <div id="history-sheet">
        <div class="history-header-tab" id="history-tab">
            <div class="drag-handle"></div><div style="font-size:11px; font-weight:700; color:#8e8e93; text-transform:uppercase;">Ιστορικό</div>
            <button class="export-btn" id="export-csv">CSV</button>
        </div>
        <div class="history-content" id="history-list-container" style="padding: 0 30px 40px; overflow-y: auto; height: calc(100% - 65px);"></div>
    </div>

    <script>
        let goalMl = parseInt(localStorage.getItem('waterGoal')) || 2000;
        let bStep = parseInt(localStorage.getItem('bottleSize')) || 750;
        let gStep = parseInt(localStorage.getItem('glassSize')) || 350;
        let history = JSON.parse(localStorage.getItem('waterHistory')) || [];

        const getTodayDate = () => {
            const d = new Date(); d.setHours(0,0,0,0);
            return d;
        };
        
        let todayStr = new Date().toLocaleDateString('el-GR');
        let todayRecord = history.find(h => h.date === todayStr);
        if (!todayRecord) { todayRecord = { date: todayStr, ml: 0, goal: goalMl }; history.unshift(todayRecord); }
        let currentMl = todayRecord.ml || 0;

        let audioCtx;
        function playSuccessSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function checkGoalBlink(prevMl) {
            if (currentMl >= goalMl && prevMl < goalMl) {
                const display = document.getElementById('global-display');
                display.classList.add('goal-blink');
                playSuccessSound();
                setTimeout(() => display.classList.remove('goal-blink'), 400);
            }
        }

        function saveData() {
            todayRecord.ml = Math.max(0, currentMl);
            todayRecord.goal = goalMl;
            localStorage.setItem('waterGoal', goalMl);
            localStorage.setItem('waterHistory', JSON.stringify(history));
            updateWeekly();
        }

        function initUI() {
            const container = document.getElementById('swipe-container');
            container.scrollLeft = window.innerWidth;
            document.getElementById('bottle-title').innerText = `Μπουκάλια (${bStep}ml)`;
            document.getElementById('glass-title').innerText = `Ποτήρια (${gStep}ml)`;
            
            const bGrid = document.getElementById('bottle-grid'); bGrid.innerHTML = '';
            for (let i = 0; i < Math.ceil(goalMl / bStep); i++) {
                const wrap = document.createElement('div'); wrap.className = 'bottle-wrap';
                wrap.style.width = '75px'; wrap.style.height = '150px';
                wrap.innerHTML = `<svg class="svg-obj" viewBox="0 0 100 200"><g clip-path="url(#bottleMask)"><rect class="water-fill" width="100" height="200" fill="#0a84ff" style="transform: translateY(200px)"/></g><rect x="40" y="2" width="20" height="10" rx="2" fill="#fff" /><path d="M 35 30 C 35 15, 40 15, 45 10 L 55 10 C 60 15, 65 15, 65 30 L 75 60 L 75 180 C 75 190, 65 195, 50 195 C 35 195, 25 190, 25 180 L 25 60 Z" fill="none" stroke="#ffffff" stroke-width="4"/><text x="50" y="115" fill="white" font-size="28" font-weight="900" text-anchor="middle">${i+1}</text></svg>`;
                wrap.onclick = () => { let prev = currentMl; let thr = (i+1)*bStep; currentMl = (currentMl >= thr) ? Math.max(0, thr-bStep) : thr; checkGoalBlink(prev); saveData(); updateUI(); };
                bGrid.appendChild(wrap);
            }

            const gGrid = document.getElementById('glass-grid'); gGrid.innerHTML = '';
            for (let i = 0; i < Math.ceil(goalMl / gStep); i++) {
                const wrap = document.createElement('div'); wrap.className = 'glass-wrap';
                wrap.style.width = '65px'; wrap.style.height = '90px';
                wrap.innerHTML = `<svg class="svg-obj" viewBox="0 0 100 150"><g clip-path="url(#glassMask)"><rect class="water-fill" width="100" height="150" fill="#0a84ff" style="transform: translateY(150px)"/></g><path d="M 15 10 L 85 10 L 75 140 C 73 145, 68 150, 50 150 C 32 150, 27 145, 25 140 Z" fill="none" stroke="#ffffff" stroke-width="4"/><text x="50" y="95" fill="white" font-size="32" font-weight="900" text-anchor="middle">${i+1}</text></svg>`;
                wrap.onclick = () => { let prev = currentMl; let thr = (i+1)*gStep; currentMl = (currentMl >= thr) ? Math.max(0, thr-gStep) : thr; checkGoalBlink(prev); saveData(); updateUI(); };
                gGrid.appendChild(wrap);
            }
            updateWeekly();
        }

        function updateWeekly() {
            const grid = document.getElementById('weekly-grid'); grid.innerHTML = '';
            const daysShort = ['ΚΥΡ','ΔΕΥ','ΤΡΙ','ΤΕΤ','ΠΕΜ','ΠΑΡ','ΣΑΒ'];
            const nowFull = new Date();
            const nowMidnight = getTodayDate();
            const currentDay = nowFull.getDay();
            const diffToMonday = (currentDay === 0 ? 6 : currentDay - 1);
            
            for(let i=0; i<7; i++) {
                const d = new Date(nowMidnight);
                d.setDate(nowMidnight.getDate() - diffToMonday + i); 
                const ds = d.toLocaleDateString('el-GR');
                
                const isFuture = d.getTime() > nowMidnight.getTime();
                const isToday = d.getTime() === nowMidnight.getTime();
                
                const rec = history.find(h => h.date === ds);
                const dMl = rec ? rec.ml : 0;
                const dGoal = rec ? rec.goal : goalMl;
                const perc = Math.min(100, (dMl / dGoal) * 100);
                
                const row = document.createElement('div'); row.className = 'week-row';
                let labelContent = isFuture ? '' : `${dMl} / ${dGoal} ml`;
                
                row.innerHTML = `
                    <div class="week-label">${daysShort[d.getDay()]}</div>
                    <div class="week-bar-bg">
                        <div class="week-bar-fill" style="width: ${isFuture ? 0 : perc}%"></div>
                        <div class="week-bar-text">${labelContent}</div>
                    </div>
                `;
                grid.appendChild(row);
            }
        }

        function updateUI() {
            const total = Math.max(0, currentMl);
            document.getElementById('global-display').innerText = `${total} / ${goalMl} ml`;
            document.querySelectorAll('#bottle-grid .water-fill').forEach((rect, i) => { let fill = Math.max(0, Math.min(bStep, total - (i * bStep))); rect.style.transform = `translateY(${200 - (fill/bStep * 200)}px)`; });
            document.querySelectorAll('#glass-grid .water-fill').forEach((rect, i) => { let fill = Math.max(0, Math.min(gStep, total - (i * gStep))); rect.style.transform = `translateY(${150 - (fill/gStep * 150)}px)`; });
            
            let pPercent = Math.min(1, total / goalMl);
            document.getElementById('pitcher-fill').style.transform = `translateY(${300 - (pPercent * 270)}px)`;
            document.getElementById('pitcher-text').innerText = total + ' ml';

            const container = document.getElementById('history-list-container'); container.innerHTML = '';
            history.forEach(h => {
                const div = document.createElement('div'); div.style.cssText = "display:flex; justify-content:space-between; padding:18px 0; border-bottom:1px solid #2c2c2e; font-size:17px;";
                div.innerHTML = `<span>${h.date === todayStr ? 'Σήμερα' : h.date}</span><span style="color:#0a84ff; font-weight:bold">${h.ml || 0} ml</span>`;
                container.appendChild(div);
            });
        }

        const pWrap = document.getElementById('pitcher-wrap');
        pWrap.ontouchmove = e => {
            let prev = currentMl;
            const rect = pWrap.getBoundingClientRect();
            const y = e.touches[0].clientY - rect.top;
            const percentage = 1 - (y / rect.height);
            const clamped = Math.max(0, Math.min(1, percentage));
            currentMl = Math.round((clamped * goalMl) / 50) * 50;
            checkGoalBlink(prev); updateUI();
        };
        pWrap.ontouchend = () => saveData();

        document.getElementById('export-csv').onclick = (e) => {
            e.stopPropagation(); let csv = "Ημερομηνία,ml,Στόχος\n";
            history.forEach(h => csv += `${h.date},${h.ml},${h.goal}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "water_history.csv"; link.click();
        };

        const mod = document.getElementById('settings-modal'), sliG = document.getElementById('goal-slider'), valG = document.getElementById('goal-val');
        document.getElementById('open-settings').onclick = () => { sliG.value = goalMl; valG.innerText = goalMl + ' ml'; mod.classList.add('open'); };
        sliG.oninput = e => valG.innerText = e.target.value + ' ml';
        document.getElementById('save-settings').onclick = () => { goalMl = parseInt(sliG.value); saveData(); mod.classList.remove('open'); initUI(); updateUI(); };

        const sc = document.getElementById('swipe-container'), ds = document.querySelectorAll('.dot');
        sc.onscroll = () => { let i = Math.round(sc.scrollLeft / window.innerWidth); ds.forEach((d, k) => d.classList.toggle('active', k === i)); };
        
        let sheet = document.getElementById('history-sheet'), hSY = 0;
        document.getElementById('history-tab').ontouchstart = e => hSY = e.touches[0].clientY;
        document.getElementById('history-tab').ontouchend = e => { if (hSY - e.changedTouches[0].clientY > 40) sheet.classList.add('open'); else if (e.changedTouches[0].clientY - hSY > 40) sheet.classList.remove('open'); };

        initUI(); updateUI();
        setTimeout(() => { sc.scrollLeft = window.innerWidth; }, 100);
    </script>
</body>
</html>
