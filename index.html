<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Water Tracker</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000; color: #ffffff;
            overflow: hidden; touch-action: none;
        }

        /* --- Top Bar & Settings --- */
        .top-bar {
            position: absolute; top: 20px; right: 20px; z-index: 50;
        }
        .icon-btn {
            background: none; border: none; color: #8e8e93; padding: 10px; cursor: pointer;
        }
        
        #settings-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #settings-modal.open { opacity: 1; pointer-events: auto; }
        
        .settings-box {
            background: #1c1c1e; padding: 30px; border-radius: 20px; text-align: center; width: 80%;
        }
        .settings-box h2 { margin-top: 0; margin-bottom: 20px; }
        .settings-box input {
            width: 100%; margin-bottom: 30px; accent-color: #0a84ff;
        }
        .val-display { font-size: 24px; font-weight: bold; color: #0a84ff; margin-bottom: 20px; }
        
        .save-btn {
            background: #0a84ff; color: #fff; border: none; padding: 12px 24px;
            border-radius: 10px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer;
        }

        /* --- Swipe Container --- */
        #swipe-container {
            display: flex; width: 100vw; height: 100vh;
            overflow-x: auto; scroll-snap-type: x mandatory;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }
        #swipe-container::-webkit-scrollbar { display: none; }
        
        .screen {
            flex: 0 0 100vw; height: 100vh; scroll-snap-align: start;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        .title-container { text-align: center; position: absolute; top: 80px; width: 100%; }
        h1 { margin: 0; font-size: 28px; font-weight: 700; color: #f2f2f7; }
        p.subtitle { margin: 5px 0 0 0; color: #8e8e93; font-size: 14px; }

        /* --- Μπουκάλια (Οθόνη 1) --- */
        .bottle-grid {
            display: grid; grid-template-columns: repeat(2, 90px);
            gap: 20px 40px; justify-content: center; margin-top: 50px;
        }
        .bottle-wrap { width: 90px; height: 180px; cursor: pointer; position: relative; }
        .bottle-wrap.center-odd { grid-column: 1 / span 2; justify-self: center; }

        .bottle-svg { width: 100%; height: 100%; display: block; }
        
        /* Το translateY ξεκινάει από 180px (Άδειο) και πάει στο 0px (Γεμάτο) */
        .water-fill { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(180px); }

        .splash-drop {
            position: absolute; top: 10px; left: 50%; width: 40px; height: 60px;
            background-color: #0a84ff; border-radius: 50%; pointer-events: none; opacity: 0; z-index: 5;
        }
        @keyframes splash {
            0% { transform: translate(-50%, 0) scale(1); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), var(--ty)) scale(0); opacity: 0; }
        }

        /* --- Ιστορικό (Ίδιο με πριν) --- */
        .swipe-hint { position: absolute; bottom: 30px; display: flex; flex-direction: column; align-items: center; opacity: 0.5; animation: bounce 2s infinite; width: 100vw; }
        .swipe-hint span { font-size: 12px; margin-top: 5px; color: #aeaeb2;}
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #history-sheet {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh;
            background-color: #1c1c1e; border-radius: 30px 30px 0 0; z-index: 60;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex; flex-direction: column; box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        #history-sheet.open { transform: translateY(0); }
        .drag-handle { width: 40px; height: 5px; background-color: #48484a; border-radius: 3px; margin: 15px auto; }
        .history-content { padding: 20px 30px; flex: 1; overflow-y: auto; touch-action: pan-y; }
        .history-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #38383a; padding-bottom: 10px; margin-bottom: 10px; }
        .history-header h2 { margin: 0; font-size: 22px; }
        #export-btn { background-color: #2c2c2e; color: #0a84ff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 15px 0; border-bottom: 1px solid #2c2c2e; display: flex; justify-content: space-between; font-size: 18px; }
        li .date { color: #f2f2f7; }
        li .liters { color: #0a84ff; font-weight: bold; }
        
        /* Δείκτες Οθόνης (Dots) */
        .dots { position: absolute; bottom: 80px; width: 100vw; display: flex; justify-content: center; gap: 8px; z-index: 10; pointer-events: none; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #48484a; transition: 0.3s; }
        .dot.active { background: #f2f2f7; }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <clipPath id="waterMask">
                <path d="M 35 30 C 35 15, 40 15, 45 10 L 55 10 C 60 15, 65 15, 65 30 L 75 60 L 75 180 C 75 190, 65 195, 50 195 C 35 195, 25 190, 25 180 L 25 60 Z"/>
            </clipPath>
        </defs>
    </svg>

    <div class="top-bar">
        <button class="icon-btn" id="open-settings">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
    </div>

    <div id="settings-modal">
        <div class="settings-box">
            <h2>Στόχος Νερού</h2>
            <div class="val-display"><span id="goal-val">5</span> Λίτρα</div>
            <input type="range" id="goal-slider" min="1" max="5" step="1" value="5">
            <button class="save-btn" id="save-settings">Αποθήκευση</button>
        </div>
    </div>

    <div id="swipe-container">
        <div class="screen" id="screen-bottles">
            <div class="title-container">
                <h1 id="main-title">Στόχος: 5 Λίτρα</h1>
                <p class="subtitle">Άγγιξε ένα μπουκάλι (1L)</p>
            </div>
            <div class="bottle-grid" id="bottle-grid"></div>
        </div>

        <div class="screen" id="screen-glasses">
            <div class="title-container">
                <h1>Ποτήρια (350ml)</h1>
                <p class="subtitle">Έρχεται στο Βήμα 2...</p>
            </div>
        </div>

        <div class="screen" id="screen-pitcher">
            <div class="title-container">
                <h1>Κανάτα</h1>
                <p class="subtitle">Έρχεται στο Βήμα 3...</p>
            </div>
        </div>
    </div>

    <div class="dots">
        <div class="dot active"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="swipe-hint">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
        <span>Ιστορικό</span>
    </div>

    <div id="history-sheet">
        <div class="drag-handle"></div>
        <div class="history-content">
            <div class="history-header">
                <h2>Ιστορικό</h2>
                <button id="export-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> CSV</button>
            </div>
            <ul id="history-list"></ul>
        </div>
    </div>

    <script>
        // --- 1. State Management (Κεντρική Μνήμη σε ML) ---
        let goalLiters = parseInt(localStorage.getItem('waterGoal')) || 5;
        let history = JSON.parse(localStorage.getItem('waterHistory')) || [];
        
        const getToday = () => new Date().toLocaleDateString('el-GR');
        let today = getToday();
        let todayRecord = history.find(h => h.date === today);

        // Μετάβαση από παλιά δεδομένα (.liters) στο νέο σύστημα (.ml)
        if (!todayRecord) {
            history.unshift({ date: today, ml: 0 });
            todayRecord = history[0];
            saveData();
        } else if (todayRecord.liters !== undefined) {
            todayRecord.ml = todayRecord.liters * 1000;
            delete todayRecord.liters;
            saveData();
        }

        let currentMl = todayRecord.ml;

        function saveData() {
            localStorage.setItem('waterGoal', goalLiters);
            localStorage.setItem('waterHistory', JSON.stringify(history));
        }

        // --- 2. Settings Logic ---
        const settingsModal = document.getElementById('settings-modal');
        const goalSlider = document.getElementById('goal-slider');
        const goalValText = document.getElementById('goal-val');

        document.getElementById('open-settings').addEventListener('click', () => {
            goalSlider.value = goalLiters;
            goalValText.innerText = goalLiters;
            settingsModal.classList.add('open');
        });

        goalSlider.addEventListener('input', (e) => {
            goalValText.innerText = e.target.value;
        });

        document.getElementById('save-settings').addEventListener('click', () => {
            goalLiters = parseInt(goalSlider.value);
            saveData();
            settingsModal.classList.remove('open');
            renderUI();
        });

        // --- 3. UI Rendering (Η καρδιά της εφαρμογής) ---
        const bottleGrid = document.getElementById('bottle-grid');
        const mainTitle = document.getElementById('main-title');

        function renderUI() {
            mainTitle.innerText = `Στόχος: ${goalLiters} Λίτρα`;
            
            // 3a. Καθαρισμός και Δημιουργία Μπουκαλιών βάσει Στόχου
            bottleGrid.innerHTML = '';
            for (let i = 0; i < goalLiters; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'bottle-wrap';
                // Αν είναι μονός αριθμός και είναι το τελευταίο μπουκάλι, βάλτο στη μέση
                if (goalLiters % 2 !== 0 && i === goalLiters - 1) wrap.classList.add('center-odd');
                
                // Υπολογισμός Γεμίσματος του συγκεκριμένου μπουκαλιού (Max 1000ml ανά μπουκάλι)
                let fillMl = Math.max(0, Math.min(1000, currentMl - (i * 1000)));
                let fillPercent = fillMl / 1000;
                let translateY = 180 - (fillPercent * 180); // 180px είναι το ύψος του άδειου

                wrap.innerHTML = `
                    <svg class="bottle-svg" viewBox="0 0 100 200">
                        <g clip-path="url(#waterMask)">
                            <rect class="water-fill" x="0" y="0" width="100" height="200" fill="#0a84ff" style="transform: translateY(${translateY}px)" />
                        </g>
                        <path d="M 35 30 C 35 15, 40 15, 45 10 L 55 10 C 60 15, 65 15, 65 30 L 75 60 L 75 180 C 75 190, 65 195, 50 195 C 35 195, 25 190, 25 180 L 25 60 Z" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
                        <rect x="40" y="2" width="20" height="8" rx="2" fill="none" stroke="#ffffff" stroke-width="4"/>
                        <text x="50" y="120" fill="rgba(255,255,255,0.7)" font-size="20" font-weight="bold" font-family="sans-serif" text-anchor="middle">1L</text>
                    </svg>
                `;

                // Click Logic: Προσθέτει ή αφαιρεί 1000ml από το κεντρικό state
                wrap.addEventListener('click', () => {
                    let bottleMaxThreshold = (i + 1) * 1000;
                    if (currentMl >= bottleMaxThreshold) {
                        currentMl -= 1000; // Αφαίρεση
                    } else {
                        currentMl += 1000; // Προσθήκη
                        createSplash(wrap);
                    }
                    // Ενημέρωση κεντρικής μνήμης και ξανασχεδιασμός
                    todayRecord.ml = currentMl;
                    saveData();
                    renderUI();
                });

                bottleGrid.appendChild(wrap);
            }
            renderHistory();
        }

        function renderHistory() {
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';
            history.forEach(item => {
                const li = document.createElement('li');
                const label = item.date === today ? 'Σήμερα' : item.date;
                // Μετατροπή ml σε Λίτρα για εμφάνιση (π.χ. 2500ml -> 2.5 L)
                const displayLiters = (item.ml !== undefined ? item.ml : (item.liters * 1000)) / 1000;
                li.innerHTML = `<span class="date">${label}</span><span class="liters">${displayLiters.toFixed(1)} L</span>`;
                historyList.appendChild(li);
            });
        }

        // --- 4. Εφέ Σταγόνων ---
        function createSplash(bottleElement) {
            setTimeout(() => {
                for (let i = 0; i < 6; i++) { 
                    const drop = document.createElement('div');
                    drop.classList.add('splash-drop');
                    const tx = (Math.random() - 0.5) * 300; 
                    const ty = -(Math.random() * 180 + 80); 
                    drop.style.setProperty('--tx', `${tx}px`);
                    drop.style.setProperty('--ty', `${ty}px`);
                    const duration = 0.6 + Math.random() * 0.5;
                    drop.style.animation = `splash ${duration}s ease-out forwards`;
                    bottleElement.appendChild(drop);
                    setTimeout(() => drop.remove(), duration * 1000);
                }
            }, 350); 
        }

        // --- 5. Swipe & Gestures Logic ---
        const swipeContainer = document.getElementById('swipe-container');
        const dots = document.querySelectorAll('.dot');
        
        // Αλλαγή των τελειών (dots) ανάλογα με το scroll
        swipeContainer.addEventListener('scroll', () => {
            let index = Math.round(swipeContainer.scrollLeft / window.innerWidth);
            dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
        });

        // Swipe up για ιστορικό (κλειδωμένο μόνο στο κεντρικό container για να μην ενοχλεί το swipe left/right)
        let startY = 0;
        const sheet = document.getElementById('history-sheet');
        const historyContent = document.querySelector('.history-content');

        document.body.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, {passive: true});
        document.body.addEventListener('touchend', e => {
            let endY = e.changedTouches[0].clientY;
            // Αν το swipe είναι καθαρά κάθετο και προς τα πάνω
            if (startY - endY > 60 && !sheet.classList.contains('open')) {
                sheet.classList.add('open');
            }
        }, {passive: true});

        sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; e.stopPropagation(); }, {passive: true});
        sheet.addEventListener('touchend', e => {
            let endY = e.changedTouches[0].clientY;
            if (endY - startY > 60 && historyContent.scrollTop <= 0) {
                sheet.classList.remove('open');
            }
            e.stopPropagation();
        }, {passive: true});

        // Αρχική Εκτέλεση
        renderUI();

    </script>
</body>
</html>
